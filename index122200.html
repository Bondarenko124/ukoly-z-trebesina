<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aritmetický průměr</title>
    <script>
        function minimum()
        {
            let n = prompt("Zadej počet čísel ze kterych chces vedet nejmensi");
            let nejmensi;
            for(let i = 0; i < n; i++)
            {
                let cislo = prompt("Zadej číslo:")*1;
               
                if (i === 0) //kdyz i rovna se 0 (ze uxivatel ne zadal zadny cislo) priradujeme prvni cislo(cislo) do promenne nejmensi
                nejmensi = cislo
            else if (cislo < nejmensi)//ale kdyz cislo je mensi nez nejmensi cislo pred tim tak znovu priradujeme dalsi cislo do promenne
            {
                nejmensi = cislo
            }
            }
            
            alert("nejmensi je "+nejmensi)
        }

    </script>
</head>
<body onload="minimum()">
    
</body>
</html>
