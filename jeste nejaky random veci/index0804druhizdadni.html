<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <script>
         let slovo = prompt("zadej slovo (vic nez 2 znaky)");

        // rucne
        let poleA = [];
        for (let i = 0; i < slovo.length; i++) {
            poleA[i] = slovo[i];
        }
        poleA[1] = "*";
        alert("rucne: " + poleA.join(""));

        // ne rucne
        let poleB = slovo.split("");
        poleB[1] = "*";
        alert("ne rucne: " + poleB.join(""));
    </script>
</head>
