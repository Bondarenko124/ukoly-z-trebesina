<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function zjistitPocetPlechovek(){

        let prvniRada = Number(document.getElementById("vstupOdUzivatele").value);
        let = plecchovelCelkem = 0;
        for(let rada = 1; rada <= prvniRada; rada++)
    {
        plecchovelCelkem += rada;

    }}
    </script>
</head>
<body>
    <form type="number" id="vstupOdUzivatele"></form>
    <input type="button" onclick="zjistitPocetPlechovek" value="vypocet">
</body>
</html>
