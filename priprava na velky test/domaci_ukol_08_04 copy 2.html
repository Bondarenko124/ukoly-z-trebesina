<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

        let slovo = prompt("zadej nejake slovo");
        let upravaneSlovo = "";

        for(let i = 0; i < slovo.length; i++){
        if (slovo[i] === "a"){
            upravaneSlovo += "1";
        } else {
            upravaneSlovo += slovo[i];
        }}
        
        alert("tvoje slovo je: " + upravaneSlovo);

    </script>
</head>
