           function pridaniEmailu()
           {
            let checkbox = document.getElementById("email");
            let forma = document.getElementById("formaa")
            if(checkbox.checked){
                let novyInput = document.createElement("input");
                novyInput.type = "email";
                novyInput.id = "dynamickyEmail";

                forma.appendChild(novyInput);
            } else {
                let emailProSmazani = document.getElementById("dynamickyEmail");
                if(emailProSmazani){
                    emailProSmazani.remove();
                }            }

           }

    </script>
